services:
  # App web (Next.js). NEXT_PUBLIC_API_URL se inlinea en el bundle al buildear
  # y corre en el navegador, por lo que debe apuntar a un host que el *navegador*
  # pueda resolver (localhost cuando el backend y el navegador están en la misma
  # máquina).
  frontend:
    build:
      context: .
      dockerfile: frontend_ticketing/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    image: ticketing_frontend
    ports:
      - "3001:3001"
    restart: unless-stopped

  # La app mobile (Expo) se levanta por separado con `expo start` (ver README),
  # no se ejecuta en Docker.
