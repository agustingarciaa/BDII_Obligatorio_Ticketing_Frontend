<svg viewBox="0 0 1440 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060f24"/>
      <stop offset="100%" stop-color="#0c1a3a"/>
    </linearGradient>
    <radialGradient id="beam" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#fff4cf" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fff4cf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13a558"/>
      <stop offset="100%" stop-color="#066b35"/>
    </linearGradient>
    <pattern id="crowd" width="11" height="11" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#9fb4dd" fill-opacity="0.5"/>
      <circle cx="8" cy="7" r="1.3" fill="#ffd873" fill-opacity="0.45"/>
      <circle cx="5" cy="10" r="1.1" fill="#e6edff" fill-opacity="0.4"/>
    </pattern>
  </defs>

  <!-- cielo y estrellas -->
  <rect width="1440" height="700" fill="url(#sky)"/>
  <g fill="#ffffff" fill-opacity="0.55">
    <circle cx="180" cy="70" r="1.4"/><circle cx="420" cy="40" r="1"/><circle cx="700" cy="80" r="1.5"/>
    <circle cx="980" cy="50" r="1"/><circle cx="1180" cy="90" r="1.3"/><circle cx="1320" cy="55" r="1"/>
    <circle cx="300" cy="110" r="1"/><circle cx="860" cy="120" r="1"/>
  </g>

  <!-- haces de los reflectores -->
  <ellipse cx="245" cy="150" rx="300" ry="260" fill="url(#beam)"/>
  <ellipse cx="1195" cy="150" rx="300" ry="260" fill="url(#beam)"/>

  <!-- bowl: techo y tribunas -->
  <ellipse cx="720" cy="700" rx="1010" ry="420" fill="#0a1733"/>
  <ellipse cx="720" cy="712" rx="900" ry="372" fill="#13284f"/>
  <!-- anillo de público con textura -->
  <ellipse cx="720" cy="724" rx="820" ry="338" fill="url(#crowd)"/>
  <g fill="none" stroke="#24407a" stroke-opacity="0.7" stroke-width="2">
    <ellipse cx="720" cy="716" rx="855" ry="352"/>
    <ellipse cx="720" cy="726" rx="770" ry="318"/>
  </g>

  <!-- cancha con rayas de césped -->
  <ellipse cx="720" cy="772" rx="580" ry="212" fill="url(#pitch)"/>
  <g stroke="#0a7a3c" stroke-opacity="0.35" stroke-width="36">
    <line x1="430" y1="585" x2="430" y2="960"/>
    <line x1="575" y1="572" x2="575" y2="975"/>
    <line x1="720" y1="566" x2="720" y2="980"/>
    <line x1="865" y1="572" x2="865" y2="975"/>
    <line x1="1010" y1="585" x2="1010" y2="960"/>
  </g>
  <!-- líneas de cancha -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="3">
    <ellipse cx="720" cy="772" rx="558" ry="200"/>
    <line x1="720" y1="572" x2="720" y2="972"/>
    <ellipse cx="720" cy="772" rx="98" ry="44"/>
  </g>

  <!-- torres de reflectores -->
  <g fill="#1c3158">
    <rect x="237" y="150" width="9" height="180"/>
    <rect x="206" y="126" width="70" height="32" rx="4"/>
    <rect x="1194" y="150" width="9" height="180"/>
    <rect x="1163" y="126" width="70" height="32" rx="4"/>
  </g>
  <g fill="#fff4cf">
    <circle cx="218" cy="142" r="3.2"/><circle cx="232" cy="142" r="3.2"/><circle cx="246" cy="142" r="3.2"/><circle cx="260" cy="142" r="3.2"/>
    <circle cx="1175" cy="142" r="3.2"/><circle cx="1189" cy="142" r="3.2"/><circle cx="1203" cy="142" r="3.2"/><circle cx="1217" cy="142" r="3.2"/>
  </g>
</svg>
